<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RTC - Residence Training Competition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.0.3/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; color: #2B2B2B; background: #F7F3E9; }

.loading-shell { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.loading-text { font-family: 'Special Elite', monospace; color: #001E51; }
.error-box { max-width: 340px; margin: 60px auto; text-align: center; padding: 24px; background: #fffdf8; border: 2px solid #001E51; border-radius: 8px; }
.error-title { font-family: 'Special Elite', monospace; font-size: 18px; color: #001E51; margin: 0 0 10px; }
.error-sub { font-size: 13px; color: #5b5b54; line-height: 1.5; margin: 0; }

.shell { min-height: 100vh; background: #F7F3E9; font-family: 'Inter', sans-serif; color: #2B2B2B; padding: 24px 16px 60px; }
.header { max-width: 900px; margin: 0 auto 16px; text-align: center; background: #001E51; border-radius: 8px; padding: 20px 18px; border-bottom: 4px solid #FAC507; }
.eyebrow { font-family: 'Special Elite', monospace; font-size: 11px; letter-spacing: 0.1em; color: #FAC507; margin: 0 0 6px; }
.title { font-family: 'Special Elite', monospace; font-size: 28px; color: #fff; margin: 0 0 6px; }
.sub { margin: 0; font-size: 13px; color: #cfe3ec; }

.lock-bar { max-width: 900px; margin: 0 auto 10px; display: flex; justify-content: flex-end; }
.lock-btn { background: #b3422a; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-weight: 700; font-size: 12px; cursor: pointer; }
.srss-link { margin-left: auto; background: none; border: 1.5px solid #8a8a7e; border-radius: 6px; padding: 8px 14px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; color: #8a8a7e; cursor: pointer; }

.day-bar { max-width: 900px; margin: 0 auto 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: #e6f3f7; border: 1.5px solid #0080A2; border-radius: 6px; padding: 10px 14px; }
.day-badge { font-family: 'Special Elite', monospace; font-size: 13px; color: #001E51; }
.new-day-btn { background: #FAC507; color: #001E51; border: none; border-radius: 6px; padding: 7px 14px; font-weight: 700; font-size: 12px; cursor: pointer; }
.cutoff-hint { font-size: 11px; color: #8a8a7e; }

.tab-bar { max-width: 900px; margin: 0 auto 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn { background: #fffdf8; border: 2px solid #001E51; border-radius: 6px; padding: 8px 14px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; color: #001E51; cursor: pointer; }
.tab-btn:hover { background: #eef6f8; }
.tab-btn-active { background: #001E51; color: #fff; }

.export-row { max-width: 900px; margin: 0 auto 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.export-btn { background: #0080A2; color: #fff; border: none; border-radius: 6px; padding: 10px 18px; font-weight: 700; font-size: 14px; cursor: pointer; }
.export-hint { font-size: 12px; color: #5b5b54; }

.card { max-width: 900px; margin: 0 auto; background: #fffdf8; border: 2px solid #001E51; border-radius: 8px; padding: 16px; overflow-x: auto; }
.card-note { font-size: 12px; color: #5b5b54; margin: 0 0 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #001E51; font-family: 'Special Elite', monospace; font-size: 11px; color: #001E51; }
td { padding: 8px 10px; border-bottom: 1px solid #e3ddc9; }
.tr-first { background: #fdf2e9; }

.sub-tab-bar { max-width: 900px; margin: 0 auto 14px; display: flex; gap: 6px; flex-wrap: wrap; }
.sub-tab-btn { background: #fffdf8; border: 1.5px solid #0080A2; border-radius: 16px; padding: 6px 12px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; color: #0080A2; cursor: pointer; }
.sub-tab-btn-active { background: #0080A2; color: #fff; }

.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
.team-toggle { display: flex; flex-direction: column; gap: 4px; background: #fffdf8; border: 2px solid #e3ddc9; border-radius: 6px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; text-align: left; width: 100%; }
.team-toggle-active { border-color: #0080A2; background: #e6f3f7; }
.excused-select { width: 100%; padding: 8px 10px; border: 1.5px solid #0080A2; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 13px; background: #fff; color: #0080A2; font-weight: 600; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 6px; background: #e6f3f7; border: 1.5px solid #0080A2; border-radius: 16px; padding: 4px 6px 4px 12px; font-size: 12px; font-weight: 600; color: #001E51; }
.chip-remove { background: #0080A2; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }

.team-block { margin-bottom: 20px; }
.session-setup-block { margin-bottom: 24px; border-bottom: 1px solid #e3ddc9; padding-bottom: 16px; }
.header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.toggle-label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: #5b5b54; }
.section-label { font-family: 'Special Elite', monospace; font-size: 13px; color: #001E51; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
.live-badge { font-size: 10px; color: #0080A2; font-weight: 700; }
.not-live-badge { font-size: 10px; color: #b3422a; font-weight: 700; }

.rank-row { display: flex; gap: 12px; flex-wrap: wrap; }
.rank-picker { display: flex; flex-direction: column; gap: 4px; }
.rank-label { font-size: 11px; font-weight: 700; color: #5b5b54; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: #5b5b54; margin-bottom: 4px; }
select, input[type="text"], input[type="number"], input[type="password"] {
  width: 100%; padding: 8px 10px; border: 1.5px solid #001E51; border-radius: 4px;
  font-family: 'Inter', sans-serif; font-size: 13px; background: #fff;
}
.submit-btn { background: #0080A2; color: #fff; border: none; border-radius: 6px; padding: 9px 18px; font-weight: 700; font-size: 13px; cursor: pointer; }
.adjust-btn { background: #fffdf8; border: 1.5px solid #001E51; border-radius: 4px; width: 28px; height: 28px; font-size: 14px; font-weight: 700; cursor: pointer; margin-right: 6px; }
.adjust-value { display: inline-block; min-width: 22px; text-align: center; font-weight: 700; margin-right: 6px; }

.team-time-grid { display: flex; flex-direction: column; gap: 8px; }
.team-time-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.team-time-label { font-weight: 700; font-size: 13px; min-width: 90px; }
.time-picker-wrap { display: inline-flex; align-items: center; gap: 4px; }
.time-picker-colon { font-weight: 700; color: #001E51; }
.cutoff-select { padding: 5px 8px; border: 1.5px solid #001E51; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 13px; background: #fff; width: auto; }
.set-time-btn { background: #0080A2; color: #fff; border: none; border-radius: 4px; padding: 6px 12px; font-weight: 700; font-size: 11px; cursor: pointer; }
.clear-time-btn { background: none; border: 1px solid #b3422a; color: #b3422a; border-radius: 4px; padding: 4px 8px; font-size: 10px; font-weight: 700; cursor: pointer; }
.mini-btn { background: #0080A2; color: #fff; border: none; border-radius: 4px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; }

.display-shell { max-width: 900px; margin: 0 auto 20px; background: #001E51; border-radius: 12px; padding: 28px 24px; text-align: center; border-bottom: 6px solid #FAC507; }
.display-eyebrow { font-family: 'Special Elite', monospace; font-size: 12px; letter-spacing: 0.14em; color: #FAC507; margin: 0 0 6px; }
.display-title { font-family: 'Special Elite', monospace; font-size: 26px; color: #fff; margin: 0 0 18px; }
.group-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.group-card { background: #0a2d70; border-radius: 10px; padding: 16px; min-width: 220px; }
.group-card-name { color: #fff; font-weight: 700; font-size: 15px; margin: 0 0 6px; font-family: 'Special Elite', monospace; }
.group-card-teams { color: #FAC507; font-weight: 700; font-size: 13px; margin: 0 0 4px; }
.group-card-time { color: #cfe3ec; font-size: 12px; margin: 0 0 10px; }
.group-card-row { display: flex; gap: 10px; align-items: flex-start; justify-content: center; }
.word-block-small { background: #0080A2; border-radius: 6px; padding: 10px 14px; min-width: 90px; }
.word-label-small { font-size: 9px; color: #e6f3f7; margin: 0; text-transform: uppercase; }
.word-small { font-family: 'Special Elite', monospace; font-size: 20px; color: #fff; margin: 2px 0; }
.timer-bar-small { width: 100%; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.timer-fill { height: 100%; transition: width 1s linear; }
.footnote { color: #8aa8c2; font-size: 11px; margin-top: 18px; }
.qr-wrap { background: #fff; padding: 10px; border-radius: 8px; display: inline-block; }

.form-shell { max-width: 420px; margin: 0 auto; display: flex; justify-content: center; }
.form-card { background: #fffdf8; border: 2px solid #001E51; border-radius: 10px; padding: 28px; width: 100%; text-align: center; }
.form-eyebrow { font-family: 'Special Elite', monospace; font-size: 11px; letter-spacing: 0.1em; color: #0080A2; margin: 0 0 6px; text-transform: uppercase; }
.form-title { font-family: 'Special Elite', monospace; font-size: 20px; color: #001E51; margin: 0 0 12px; }
.demo-note { font-size: 11px; color: #8a8a7e; background: #F7F3E9; padding: 8px; border-radius: 6px; margin-bottom: 14px; text-align: left; }
.field-label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #5b5b54; margin: 14px 0 6px; }
.form-error { color: #b3422a; font-size: 13px; margin-top: 12px; }
.result-icon { font-size: 40px; margin: 0 0 8px; }
.result-title { font-family: 'Special Elite', monospace; font-size: 18px; color: #001E51; margin: 0 0 10px; }
.result-message { font-size: 14px; color: #2B2B2B; line-height: 1.5; margin: 0 0 12px; }
.result-detail { font-size: 12px; color: #8a8a7e; margin: 0; }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,30,81,0.55); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }

@media (prefers-reduced-motion: reduce) { .timer-fill { transition: none; } }
</style>
</head>
<body>

<div id="root">
  <div class="loading-shell"><p class="loading-text">Loading RTC...</p></div>
</div>

<script type="module">
try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getFirestore, doc, getDoc, setDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

  const firebaseConfig = {
    apiKey: "AIzaSyCOHe7_Z_-JPqH6Y4djsV2Jf06WsyO4Nlk",
    authDomain: "residence-training-competition.firebaseapp.com",
    projectId: "residence-training-competition",
    storageBucket: "residence-training-competition.firebasestorage.app",
    messagingSenderId: "984744781090",

  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);

  window.__firebase = { db, doc, getDoc, setDoc, onSnapshot };
  window.__firebaseReady = true;
} catch (e) {
  console.error("Firebase SDK failed to initialize:", e);
  window.__firebaseInitError = e.message || String(e);
}
</script>

<script type="module" src="./app.js"></script>

</body>
</html>
